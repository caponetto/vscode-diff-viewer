name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.event.pull_request && format('ci-pr-{0}', github.event.pull_request.number) || 'ci-push-main' }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: "Setup environment"
        uses: ./.github/actions/setup-env

      - name: "Resolve version"
        id: version
        shell: bash
        run: |
          echo "version=$(node -e "console.log(require('./package.json').version);")" >> $GITHUB_OUTPUT

      - name: "Build"
        run: npm run build:prod

      - name: "Test with Coverage (Ubuntu only)"
        if: matrix.os == 'ubuntu-latest'
        run: npm run test:coverage:ci

      - name: "Test"
        if: matrix.os != 'ubuntu-latest'
        run: npm test

      - name: "Web Smoke Test (Ubuntu only)"
        if: matrix.os == 'ubuntu-latest'
        run: npm run smoke:web

      - name: "Desktop Integration Test (Ubuntu only)"
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a npm run test:integration:desktop

      - name: "Pack extension (Ubuntu only)"
        if: matrix.os == 'ubuntu-latest'
        run: npm run pack:extension

      - name: "Upload Coverage Report (Ubuntu only)"
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: "Upload coverage reports to Codecov (Ubuntu only)"
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: "Upload vsix (Ubuntu only)"
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: vscode_diff_viewer_v${{ steps.version.outputs.version }}
          path: dist/vscode_diff_viewer_v${{ steps.version.outputs.version }}.vsix
